# -- Site Configuration --
# Documentazione del tema: https://jpanther.github.io/congo/docs/

baseURL = "https://cti.al/"
theme = "congo"
defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 0

[pagination]
  pagerSize = 15

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON è richiesto dalla ricerca

[taxonomies]
  tag = "tags"

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true
